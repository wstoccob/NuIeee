# Production Environment - For VPS Deployment Only
# Use this with: docker compose -f docker-compose.prod.yml up -d
# Services are exposed via reverse proxy (nginx/traefik) with proper URLs

services:
  api:
    image: ghcr.io/${GHCR_OWNER}/nuieee-backend:latest
    container_name: nuieee-api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=nuieee;Username=postgres;Password=${DB_PASSWORD}
      JWT__KEY: ${JWT__KEY}
      MinIO__Endpoint: http://minio:9000
      MinIO__AccessKey: ${MINIO_ROOT_USER:-minioadmin}
      MinIO__SecretKey: ${MINIO_ROOT_PASSWORD}
      MinIO__BucketName: nuieee-prod
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nuieee-network

  db:
    image: postgres:16
    container_name: nuieee-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nuieee
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nuieee-network

  minio:
    image: quay.io/minio/minio
    container_name: nuieee-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_SERVER_URL: https://minio.ieee.nu
      MINIO_BROWSER_REDIRECT_URL: https://minio-console.ieee.nu
    volumes:
      - minio_prod_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - nuieee-network

volumes:
  postgres_prod_data:
  minio_prod_data:

networks:
  nuieee-network:
    driver: bridge
