# Development Environment - For Local Development Only
# Use this with: docker compose up -d
# All services are on localhost, no external URLs needed

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nuieee-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_HTTP_PORTS: 8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=nuieee_dev;Username=postgres;Password=${DB_PASSWORD:-dev-password}
      JWT__KEY: ${JWT__KEY:-dev-jwt-key-not-secure}
      MinIO__Endpoint: localhost:9000
      MinIO__AccessKey: minioadmin
      MinIO__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      MinIO__BucketName: event-photos
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - nuieee-network

  db:
    image: postgres:16
    container_name: nuieee-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: nuieee_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev-password}
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - nuieee-network

  minio:
    image: quay.io/minio/minio
    container_name: nuieee-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_dev_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    networks:
      - nuieee-network

volumes:
  postgres_dev_data:
  minio_dev_data:

networks:
  nuieee-network:
    driver: bridge
